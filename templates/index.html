<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IrisAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
</head>
<body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand">
                <svg class="brand-logo runbook-mark" viewBox="0 0 32 32" aria-hidden="true">
                    <path d="M7 4.5h12.5c3 0 5.5 2.5 5.5 5.5v16.5H11.5A4.5 4.5 0 0 0 7 31V4.5Z" />
                    <path d="M10.5 9.5h8M10.5 13.5h6" />
                    <path d="M12 21.5c2.1-3 4.4-1.1 5.3-3.6.6-1.6 1.6-2.3 3.2-2.4" />
                    <circle cx="11.7" cy="21.8" r="1.4" />
                    <circle cx="21.4" cy="15.4" r="1.4" />
                </svg>
                <div class="brand-copy">
                    <h1 class="brand-title">IrisAI</h1>
                </div>
            </div>

            <nav class="nav-menu"></nav>

            <div class="sidebar-footer">
                <div class="system-status">
                    <span id="sidebarIndicator" class="status-indicator"></span>
                    <div class="status-text">
                        <span id="sidebarVersion">IrisAI</span>
                        <span id="sidebarStatus">Preparing local session...</span>
                    </div>
                </div>
            </div>
        </aside>

        <main id="main-content" class="main-content" tabindex="-1">
            <header class="topbar">
                <div>
                    <h2 id="pageTitle" class="page-title">Dashboard</h2>
                </div>

                <div class="header-actions">
                    <div class="theme-switch" role="group" aria-label="Color theme">
                        <button type="button" data-theme-choice="light">Light</button>
                        <button type="button" data-theme-choice="dark">Dark</button>
                    </div>
                    <span id="runtimeStatusPill" class="badge badge-outline">Idle</span>
                    <span id="authStatusPill" class="badge badge-outline">Offline</span>
                </div>
            </header>

            <div id="alertStack" class="alerts-container"></div>

            <div class="views-wrapper">
                <section id="view-dashboard" class="view active"></section>
                <section id="view-queue" class="view"></section>
                <section id="view-playstyles" class="view"></section>
                <section id="view-history" class="view"></section>
                <section id="view-settings" class="view"></section>
            </div>

            <div id="queueDock" class="queue-dock hidden"></div>
        </main>
    </div>

    <div id="authModal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <p class="eyebrow">Authentication Required</p>
                <h3>Enter your Iris API key</h3>
                <p id="authInstructions">Enter the API key supplied by your configured integration provider. Your key is handled by Python only and is not rendered back into the UI.</p>
            </div>

            <form id="authForm" class="modal-form">
                <label class="input-group">
                    <span>API Key</span>
                    <input id="apiKeyInput" type="password" autocomplete="off" placeholder="Paste your key">
                </label>
                <div id="authMessage" class="auth-message hidden"></div>
                <button id="authSubmitBtn" class="btn btn-primary w-full" type="submit">Unlock UI</button>
            </form>
        </div>
    </div>

    <div id="tooltip" class="tooltip hidden"></div>
    <div id="toast" class="toast hidden"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
